name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Check coverage thresholds
        run: |
          node -e "
            const summary = require('./coverage/coverage-summary.json');
            const t = summary.total;
            const fails = [];
            if (t.statements.pct < 80) fails.push('Statements: ' + t.statements.pct + '% < 80%');
            if (t.branches.pct < 75) fails.push('Branches: ' + t.branches.pct + '% < 75%');
            if (t.functions.pct < 80) fails.push('Functions: ' + t.functions.pct + '% < 80%');
            if (t.lines.pct < 80) fails.push('Lines: ' + t.lines.pct + '% < 80%');
            if (fails.length) { console.error('Coverage below threshold:\\n' + fails.join('\\n')); process.exit(1); }
            console.log('Coverage OK — Stmts:', t.statements.pct + '%, Branches:', t.branches.pct + '%, Funcs:', t.functions.pct + '%, Lines:', t.lines.pct + '%');
          "
