name: no-secrets
description: Block hardcoded API keys, tokens, and passwords from being committed

on:
  commit:
    lifecycle: pre
    paths:
      - "src/**"
      - "*.json"

blocking: true

steps:
  - name: Scan for hardcoded secrets
    run: |
      $ErrorActionPreference = 'Stop'
      $secretPatterns = @(
        @{ Name = 'Bearer token'; Pattern = "Bearer\s+[A-Za-z0-9\-_\.]{20,}" },
        @{ Name = 'API key assignment'; Pattern = "(?:api[_-]?key|apikey|api_secret)\s*[:=]\s*['\`"][A-Za-z0-9\-_\.]{16,}['\`"]" },
        @{ Name = 'OpenAI key'; Pattern = "sk-[A-Za-z0-9]{20,}" },
        @{ Name = 'AWS key'; Pattern = "AKIA[0-9A-Z]{16}" },
        @{ Name = 'Private key block'; Pattern = "-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----" },
        @{ Name = 'Password assignment'; Pattern = "(?:password|passwd|pwd)\s*[:=]\s*['\`"][^'\`"]{8,}['\`"]" },
        @{ Name = 'Connection string'; Pattern = "(?:mongodb|postgres|mysql|redis)://[^\s]{10,}" },
        @{ Name = 'GitHub PAT'; Pattern = "ghp_[A-Za-z0-9]{36}" },
        @{ Name = 'npm token'; Pattern = "npm_[A-Za-z0-9]{36}" }
      )
      $violations = @()
      $files = git diff --cached --name-only --diff-filter=ACM | Where-Object { $_ -match '\.(ts|json)$' -and $_ -notmatch 'node_modules|\.env\.example|package-lock' }
      if (-not $files) {
        Write-Host '✅ No relevant files staged — skipping secret scan'
        exit 0
      }
      foreach ($file in $files) {
        if (-not (Test-Path $file)) { continue }
        $lines = Get-Content $file -ErrorAction SilentlyContinue
        for ($i = 0; $i -lt $lines.Count; $i++) {
          foreach ($sp in $secretPatterns) {
            if ($lines[$i] -match $sp.Pattern) {
              $violations += "$($sp.Name) in ${file}:$($i + 1)"
            }
          }
        }
      }
      if ($violations.Count -gt 0) {
        Write-Host '❌ Hardcoded secrets detected. Use environment variables instead.'
        Write-Host ''
        foreach ($v in $violations) {
          Write-Host "  $v"
        }
        exit 1
      }
      Write-Host "✅ No hardcoded secrets found in $($files.Count) file(s)"
